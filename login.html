<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Приют «Убежище»</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="notifications"></div>

    <header>
        <div class="container">
            <h1>🐾 Приют «Убежище»</h1>
            <nav>
                <a href="index.html">Главная</a>
                <a href="animals.html">Животные</a>
            </nav>
        </div>
    </header>

    <section style="min-height: calc(100vh - 200px); display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, rgba(255, 149, 0, 0.05) 0%, rgba(255, 165, 0, 0.05) 100%); padding: 2rem 0;">
        <div style="max-width: 450px; width: 100%; padding: 0 1rem;">
            <div class="card" style="box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <div style="font-size: 3rem; margin-bottom: 1rem;">🔐</div>
                    <h1 style="font-size: 1.75rem; margin-bottom: 0.5rem; color: var(--primary-orange);">Вход в аккаунт</h1>
                    <p style="color: var(--text-gray); margin: 0;">Введите ваши данные для входа</p>
                </div>

                <form id="login-form" style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <div class="form-group">
                        <label for="email">Email адрес</label>
                        <input type="email" id="email" name="email" placeholder="your@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Пароль</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.875rem; font-weight: 700;">Войти</button>
                </form>

                <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border-light); text-align: center;">
                    <p style="color: var(--text-gray); margin-bottom: 1rem;">Нет аккаунта?</p>
                    <a href="register.html" class="btn btn-outline" style="width: 100%;">Создать аккаунт</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Подключаем скрипт. ВАЖНО: файл app.js должен лежать в папке js/ -->
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('login-form');
            if (loginForm) {
                loginForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    
                    // Проверяем, загружена ли функция login из app.js
                    if (typeof login === 'function') {
                        login(email, password);
                    } else {
                        alert('Ошибка: Скрипт app.js не загружен. Проверьте, что файл лежит в папке js/');
                    }
                });
            }
        });
    </script>
</body>
</html>
