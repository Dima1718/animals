<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль животного - Приют для животных</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Notifications -->
    <div class="notifications"></div>

    <!-- Header -->
    <header>
        <div class="container">
            <h1>🐾 Приют «Убежище»</h1>
            <nav>
                <a href="index.html">Главная</a>
                <a href="animals.html">Животные</a>
                <div id="user-info"></div>
                <a id="login-btn" href="login.html" class="btn btn-small" style="background-color: white; color: var(--primary);">Вход</a>
            </nav>
        </div>
    </header>

    <!-- Breadcrumb -->
    <section style="background-color: var(--bg); padding: 1rem 0; border-bottom: 1px solid var(--border);">
        <div class="container">
            <a href="animals.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">← Вернуться к животным</a>
        </div>
    </section>

    <!-- Animal Detail -->
    <section>
        <div class="container">
            <div id="animal-detail" class="grid grid-2" style="gap: 3rem; margin-top: 2rem;">
                <div style="text-align: center;">
                    <div class="loader"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="grid grid-3">
                <div>
                    <h4>Приют «Убежище»</h4>
                    <p>Дарим животным второй шанс на счастье</p>
                </div>
                <div>
                    <h4>Контакты</h4>
                    <p>📞 +7 (999) 123-45-67<br>📧 info@shelter.ru</p>
                </div>
                <div>
                    <h4>Часы работы</h4>
                    <p>Пн-Вс: 09:00 - 18:00<br>Без выходных</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 Приют «Убежище». Все права защищены.</p>
            </div>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        function loadAnimalDetail() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            
            if (!id) {
                window.location.href = 'animals.html';
                return;
            }
            
            const animal = getAnimal(id);
            
            if (!animal) {
                document.getElementById('animal-detail').innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem;"><p>Животное не найдено</p></div>';
                return;
            }
            
            const statusLabels = {
                'available': 'Доступно',
                'reserved': 'Зарезервировано',
                'adopted': 'Усыновлено'
            };
            
            const statusColors = {
                'available': 'badge-primary',
                'reserved': 'badge-warning',
                'adopted': 'badge-danger'
            };
            
            document.getElementById('animal-detail').innerHTML = `
                <div>
                    <div style="background: linear-gradient(135deg, rgba(8,145,178,0.1) 0%, rgba(6,182,212,0.1) 100%); border-radius: 1rem; overflow: hidden; margin-bottom: 2rem; display: flex; align-items: center; justify-content: center; height: 400px; font-size: 8rem;">
                        ${animal.photo}
                    </div>
                </div>
                <div>
                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 2rem;">
                        <div>
                            <h1 style="margin: 0; color: var(--primary); font-size: 2.5rem;">${animal.name}</h1>
                            <p style="color: var(--text-light); font-size: 1.1rem; margin: 0.5rem 0 0 0;">${animal.species}</p>
                        </div>
                        <span class="badge ${statusColors[animal.status]}" style="font-size: 1rem; padding: 0.5rem 1rem;">${statusLabels[animal.status]}</span>
                    </div>

                    <div class="card" style="margin-bottom: 1.5rem;">
                        <h3 style="color: var(--primary); margin-top: 0;">📋 Информация</h3>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                            <div>
                                <p style="color: var(--text-light); margin: 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px;">Вид</p>
                                <p style="margin: 0.5rem 0 0 0; font-weight: 600; color: var(--text); font-size: 1.1rem;">${animal.species}</p>
                            </div>
                            ${animal.breed ? `
                            <div>
                                <p style="color: var(--text-light); margin: 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px;">Порода</p>
                                <p style="margin: 0.5rem 0 0 0; font-weight: 600; color: var(--text); font-size: 1.1rem;">${animal.breed}</p>
                            </div>
                            ` : ''}
                            ${animal.age ? `
                            <div>
                                <p style="color: var(--text-light); margin: 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px;">Возраст</p>
                                <p style="margin: 0.5rem 0 0 0; font-weight: 600; color: var(--text); font-size: 1.1rem;">${animal.age} ${animal.age === 1 ? 'год' : animal.age < 5 ? 'года' : 'лет'}</p>
                            </div>
                            ` : ''}
                            <div>
                                <p style="color: var(--text-light); margin: 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px;">Статус</p>
                                <p style="margin: 0.5rem 0 0 0; font-weight: 600; color: var(--text); font-size: 1.1rem;">${statusLabels[animal.status]}</p>
                            </div>
                        </div>
                    </div>

                    ${animal.description ? `
                    <div class="card" style="margin-bottom: 1.5rem;">
                        <h3 style="color: var(--primary); margin-top: 0;">📝 Описание</h3>
                        <p style="line-height: 1.8; color: var(--text); font-size: 1rem;">${animal.description}</p>
                    </div>
                    ` : ''}

                    <div class="card" style="background: linear-gradient(135deg, rgba(8,145,178,0.05) 0%, rgba(6,182,212,0.05) 100%); margin-bottom: 1.5rem;">
                        <h3 style="color: var(--primary); margin-top: 0;">❤️ Требования к хозяину</h3>
                        <ul style="margin: 0; padding-left: 1.5rem; color: var(--text); line-height: 1.8;">
                            <li>Любовь и забота к животному</li>
                            <li>Регулярные прогулки и активность</li>
                            <li>Ветеринарное обслуживание и здоровье</li>
                            <li>Безопасная и комфортная среда проживания</li>
                            <li>Терпение и понимание к особенностям животного</li>
                        </ul>
                    </div>

                    ${animal.status === 'available' ? `
                    <button class="btn btn-primary" onclick="bookAnimal(${animal.id})" style="width: 100%; padding: 1rem; font-size: 1.1rem; font-weight: 700;">
                        🐾 Забронировать / Зарезервировать
                    </button>
                    ` : `
                    <button class="btn" style="width: 100%; padding: 1rem; font-size: 1.1rem; background-color: #cbd5e1; color: var(--text-light); cursor: not-allowed;" disabled>
                        ${statusLabels[animal.status]}
                    </button>
                    `}
                </div>
            `;
        }

        function bookAnimal(animalId) {
            if (!isLoggedIn()) {
                showNotification('Пожалуйста, войдите в аккаунт для бронирования', 'warning');
                setTimeout(() => window.location.href = 'login.html', 1500);
                return;
            }
            
            if (createBooking(animalId)) {
                setTimeout(() => window.location.href = 'account.html', 1500);
            }
        }

        loadAnimalDetail();
    </script>
</body>
</html>
