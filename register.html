<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Приют для животных</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">🐾 Приют "Друг"</a>
            <div class="nav-links">
                <a href="index.html">Главная</a>
                <a href="catalog.html">Наши животные</a>
                <a href="login.html">Войти</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="auth-form">
            <h2>Создать аккаунт</h2>
            <!-- Убрали onsubmit="register()", теперь за это отвечает js/app.js -->
            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Имя</label>
                    <input type="text" id="name" name="name" required placeholder="Введите ваше имя">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="example@mail.ru">
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" required placeholder="Минимум 6 символов">
                </div>
                <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
            </form>
            <p class="auth-footer">
                Уже есть аккаунт? <a href="login.html">Войти</a>
            </p>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Приют для животных "Друг". Все права защищены.</p>
        </div>
    </footer>

    <!-- Подключаем основной файл скриптов -->
    <script src="js/app.js"></script>
</body>
</html>
